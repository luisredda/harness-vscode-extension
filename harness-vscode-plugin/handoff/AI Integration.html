<!DOCTYPE html>
<html lang="en" style="--accent: oklch(78% 0.13 200); --accent-dim: oklch(62% 0.14 210); --accent-soft: oklch(78% 0.13 200 / 0.10); --accent-ring: oklch(78% 0.13 200 / 0.25);">
<head>
<meta charset="utf-8">
<title>Harness AI Integration — UI</title>
<meta name="viewport" content="width=1600">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="ai-integration.css">
<!-- Paths are relative to handoff/ folder. Copy the bundle into a
     spare directory and open this file to see the full design. -->

<style>
  html, body { margin: 0; background: #0C0E12; color: #EDF1F7; font-family: 'IBM Plex Sans', system-ui, sans-serif; }
  .dc-section-head { color: #EDF1F7; font-weight: 600; letter-spacing: -0.01em; }
  .dc-section-sub { color: #8D96A5; }
  .dc-label { color: #8D96A5; font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
  .note-card {
    width: 360px;
    padding: 18px 20px;
    background: #14171C;
    border: 1px solid #242933;
    border-radius: 10px;
    font-size: 12px;
    line-height: 1.55;
    color: #C7CED9;
  }
  .note-card h3 {
    font-size: 13px; color: #EDF1F7; margin-bottom: 8px;
    font-weight: 600; letter-spacing: -0.01em;
  }
  .note-card ul { padding-left: 16px; margin-top: 6px; }
  .note-card li { margin-bottom: 4px; }
  .note-card code { font-family: 'JetBrains Mono', monospace; color: oklch(78% 0.13 200); font-size: 11px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="./design-canvas.jsx" data-plugins="transform-react-jsx-source" data-filename="design-canvas.jsx"></script>
<script type="text/babel" src="./ai-integration.jsx" data-plugins="transform-react-jsx-source" data-filename="ai-integration.jsx"></script>

<script type="text/babel" data-plugins="transform-react-jsx-source" data-filename="inline">
function App() {
  return (
    <DesignCanvas minScale={0.15} maxScale={3}>

      {/* ── SECTION 1 — BAR-ONLY STATES (focus on the atom) ── */}
      <DCSection
        title="AI bar — all states"
        subtitle="The single atom: tool badge · input · send · status line. Every state of the detector + MCP lifecycle represented on its own."
        gap={28}
      >
        {[
          { id:'01', label:'01 · Detecting',            state:'detecting' },
          { id:'02', label:'02 · No AI tool found',     state:'none' },
          { id:'03', label:'03 · MCP not configured',   state:'unconfigured', toolId:'claudecode-cli' },
          { id:'04', label:'04 · Ready · Claude CLI',   state:'ready', toolId:'claudecode-cli' },
          { id:'05', label:'05 · Ready · multi-tool',   state:'ready', toolId:'claudecode-cli', multi:true },
          { id:'06', label:'06 · Sending',              state:'sending', toolId:'claudecode-cli', value:'why did step 3 fail?' },
          { id:'07', label:'07 · Error · retry',        state:'error',  toolId:'claudecode-cli' },
          { id:'08', label:'08 · Ready · Cursor',       state:'ready', toolId:'cursor' },
          { id:'09', label:'09 · Ready · Windsurf',     state:'ready', toolId:'windsurf' },
          { id:'10', label:'10 · Ready · Claude Ext',   state:'ready', toolId:'claudecode-ext' },
        ].map(s => (
          <DCArtboard key={s.id} label={s.label} width={520} height={110} style={{background:'transparent'}}>
            <div className="ab-bar-only">
              <AIBar {...s}/>
            </div>
          </DCArtboard>
        ))}
      </DCSection>

      {/* ── SECTION 2 — IN-PANEL CONTEXT ── */}
      <DCSection
        title="In panel — contextual states"
        subtitle="Each state as it appears at the bottom of the pipeline panel, with a realistic execution above. This is what the developer actually sees."
        gap={36}
      >
        <DCArtboard label="A · Detecting on first open" width={360} height={720}>
          <div className="ab-ai">
            <MiniPanel title="payments-api · deploy" status="running">
              <AIBar state="detecting"/>
            </MiniPanel>
          </div>
        </DCArtboard>

        <DCArtboard label="B · Ready — common happy path" width={360} height={720}>
          <div className="ab-ai">
            <MiniPanel title="payments-api · deploy" status="running">
              <AIBar state="ready" toolId="claudecode-cli"
                     onActivity="MCP"/>
            </MiniPanel>
          </div>
        </DCArtboard>

        <DCArtboard label="C · Unconfigured + nudge banner" width={360} height={720}>
          <div className="ab-ai">
            <MiniPanel title="payments-api · deploy" status="failed">
              <AIBar state="unconfigured" toolId="claudecode-cli"/>
            </MiniPanel>
          </div>
        </DCArtboard>

        <DCArtboard label="D · MCP setup card expanded" width={360} height={720}>
          <div className="ab-ai">
            <MiniPanel title="payments-api · deploy" status="failed">
              <AIBar
                state="unconfigured"
                toolId="claudecode-cli"
                overlay={<MCPConfigureCard toolId="claudecode-cli"/>}
              />
            </MiniPanel>
          </div>
        </DCArtboard>

        <DCArtboard label="E · Configuring…" width={360} height={720}>
          <div className="ab-ai">
            <MiniPanel title="payments-api · deploy" status="failed">
              <AIBar
                state="unconfigured"
                toolId="claudecode-cli"
                overlay={<MCPConfigureCard toolId="claudecode-cli" busy/>}
              />
            </MiniPanel>
          </div>
        </DCArtboard>

        <DCArtboard label="F · Configured — restart prompt" width={360} height={720}>
          <div className="ab-ai">
            <MiniPanel title="payments-api · deploy" status="failed">
              <AIBar
                state="ready"
                toolId="claudecode-cli"
                overlay={<MCPConfigureCard toolId="claudecode-cli" done/>}
              />
            </MiniPanel>
          </div>
        </DCArtboard>

        <DCArtboard label="G · Sending query (CLI)" width={360} height={720}>
          <div className="ab-ai">
            <MiniPanel title="payments-api · deploy" status="failed">
              <AIBar state="sending" toolId="claudecode-cli" value="why did integration tests fail?"/>
            </MiniPanel>
          </div>
        </DCArtboard>

        <DCArtboard label="H · CLI response · inline" width={360} height={720}>
          <div className="ab-ai">
            <MiniPanel title="payments-api · deploy" status="failed" footerOnly>
              <AIBar
                state="ready"
                toolId="claudecode-cli"
                overlay={<ResponsePanel/>}
              />
            </MiniPanel>
          </div>
        </DCArtboard>

        <DCArtboard label="I · Launched in external tool" width={360} height={720}>
          <div className="ab-ai">
            <MiniPanel title="payments-api · deploy" status="failed">
              <AIBar
                state="ready"
                toolId="claudecode-ext"
                overlay={<ResponsePanel variant="launched"/>}
              />
            </MiniPanel>
          </div>
        </DCArtboard>

        <DCArtboard label="J · Windsurf — clipboard fallback" width={360} height={720}>
          <div className="ab-ai">
            <MiniPanel title="payments-api · deploy" status="failed">
              <AIBar
                state="ready"
                toolId="windsurf"
                overlay={<ResponsePanel variant="clipboard"/>}
              />
            </MiniPanel>
          </div>
        </DCArtboard>
      </DCSection>

      {/* ── SECTION 3 — TOOL PICKER ── */}
      <DCSection
        title="Tool picker — when multiple are installed"
        subtitle="Click the badge on the AI bar. Shows every detected tool with its MCP state, priority order at the bottom. Only appears when ≥2 tools are detected."
        gap={36}
      >
        <DCArtboard label="All four installed · CLI selected" width={360} height={720}>
          <div className="ab-ai">
            <MiniPanel title="payments-api · deploy" status="running">
              <AIBar
                state="ready"
                toolId="claudecode-cli"
                multi
                overlay={
                  <ToolPicker
                    toolId="claudecode-cli"
                    installed={[
                      { id:'claudecode-cli', mcpReady:true },
                      { id:'claudecode-ext', mcpReady:true },
                      { id:'cursor',         mcpReady:false },
                      { id:'windsurf',       mcpReady:false },
                    ]}
                  />
                }
              />
            </MiniPanel>
          </div>
        </DCArtboard>

        <DCArtboard label="Mixed MCP readiness · CLI + Cursor" width={360} height={720}>
          <div className="ab-ai">
            <MiniPanel title="payments-api · deploy" status="failed">
              <AIBar
                state="ready"
                toolId="cursor"
                multi
                overlay={
                  <ToolPicker
                    toolId="cursor"
                    installed={[
                      { id:'claudecode-cli', mcpReady:false },
                      { id:'cursor',         mcpReady:true },
                    ]}
                  />
                }
              />
            </MiniPanel>
          </div>
        </DCArtboard>

        <DCArtboard label="Design notes" width={360} height={720} style={{background:'transparent'}}>
          <div className="note-card">
            <h3>Design decisions</h3>
            <ul>
              <li>Badge replaces the old <code>avatar</code> — it shows <em>which</em> tool is answering, not just "AI".</li>
              <li>Status line is always visible so MCP state is never a surprise mid-query.</li>
              <li>Amber dot for unconfigured (action available) vs red for fatal (nothing installed).</li>
              <li>The MCP setup card is inline above the bar, not a modal — the user can still read the pipeline context while deciding.</li>
              <li>CLI results render in place with the tool-call trace visible. External tools show a 3s confirmation then collapse.</li>
              <li>Windsurf (no URI handler) uses the same overlay shape with a different icon + copy — consistent vocabulary.</li>
              <li>Priority order is exposed in the picker footer so users understand why a tool was picked.</li>
            </ul>
          </div>
        </DCArtboard>
      </DCSection>

      {/* ── SECTION 4 — LIFECYCLE DIAGRAM ── */}
      <DCSection
        title="Lifecycle — what the user sees, step by step"
        subtitle="Running horizontally as the state changes. The bar is a single component that swaps children based on detection + MCP state."
        gap={36}
      >
        <DCArtboard label="State flow" width={1080} height={280} style={{background:'transparent'}}>
          <div className="flow">
            <div className="flow-title">From activate() to answer</div>
            <div className="flow-sub">All five steps render in the same AI bar slot — no modals, no navigation.</div>
            <div className="flow-row">
              <div className="flow-step">
                <div className="flow-step-n">01 · DETECT</div>
                <div className="flow-step-t">Detecting AI tools…</div>
                <div className="flow-step-d">Silent, non-blocking. Spinner replaces the badge. Input disabled.</div>
              </div>
              <div className="flow-step">
                <div className="flow-step-n">02 · NUDGE</div>
                <div className="flow-step-t">MCP not configured</div>
                <div className="flow-step-d">Amber dot + "Configure MCP ›". One click opens the inline setup card.</div>
              </div>
              <div className="flow-step">
                <div className="flow-step-n">03 · CONFIGURE</div>
                <div className="flow-step-t">Writes ~/.claude.json</div>
                <div className="flow-step-d">Uses stored PAT. Shows exact path + auth source. Reversible — "Not now".</div>
              </div>
              <div className="flow-step">
                <div className="flow-step-n">04 · READY</div>
                <div className="flow-step-t">MCP ready · tool name</div>
                <div className="flow-step-d">Green dot. Input enabled. Badge shows which tool will answer.</div>
              </div>
              <div className="flow-step">
                <div className="flow-step-n">05 · ANSWER</div>
                <div className="flow-step-t">Inline response or launch</div>
                <div className="flow-step-d">CLI → rendered in place with MCP tool calls. URI tools → 3s confirm.</div>
              </div>
            </div>
          </div>
        </DCArtboard>
      </DCSection>

      <DCPostIt top={30} left={60} rotate={-2} width={260}>
        <strong>Scope:</strong> this covers every UI state in the spec (detection, MCP setup, 4 launchers, response display, tool picker). Wiring + message handlers stay in <span style={{fontFamily:'monospace', fontSize:12}}>extension.ts</span>. The visual system reuses the existing panel tokens — no new colors, no new fonts.
      </DCPostIt>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
