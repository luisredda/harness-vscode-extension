<!DOCTYPE html>
<html lang="en" style="--accent: oklch(78% 0.13 200); --accent-dim: oklch(62% 0.14 210); --accent-soft: oklch(78% 0.13 200 / 0.10); --accent-ring: oklch(78% 0.13 200 / 0.25);">
<head>
<meta charset="utf-8">
<title>Handoff · Artboards</title>
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../ai-integration.css">
<style>
  html, body { margin: 0; background: #0C0E12; color: #EDF1F7; font-family: 'IBM Plex Sans', system-ui, sans-serif; }
  .sheet { padding: 40px; }
  .sheet h2 { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; margin: 32px 0 4px; color:#EDF1F7; }
  .sheet h2:first-child { margin-top: 0; }
  .sheet p.sub { font-size: 12px; color: #8D96A5; margin: 0 0 18px; }
  .grid { display: grid; grid-template-columns: repeat(2, 360px); gap: 24px; justify-content: start; }
  .grid.bars { grid-template-columns: 1fr; max-width: 720px; }
  .card { background: transparent; }
  .card .lbl { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #8D96A5; margin-bottom: 8px; }
  .card .frame { background:#14171C; border:1px solid #242933; border-radius:10px; overflow:hidden; }
  .card.bar .frame { padding: 16px; }
  .card.full .frame { height: 720px; }
  .card.full .ab-ai { height: 100%; }
  .flow-wrap { background:#14171C; border:1px solid #242933; border-radius:10px; padding: 24px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../ai-integration.jsx" data-plugins="transform-react-jsx-source" data-filename="ai-integration.jsx"></script>

<script type="text/babel" data-plugins="transform-react-jsx-source" data-filename="inline">
function Bar({ label, ...props }) {
  return (
    <div className="card bar">
      <div className="lbl">{label}</div>
      <div className="frame"><AIBar {...props}/></div>
    </div>
  );
}
function Full({ label, children }) {
  return (
    <div className="card full">
      <div className="lbl">{label}</div>
      <div className="frame"><div className="ab-ai">{children}</div></div>
    </div>
  );
}

function App() {
  return (
    <div className="sheet">
      <h2>Section 1 — AI bar, all states</h2>
      <p className="sub">The atom: tool badge · input · send · status line.</p>
      <div className="grid bars">
        <Bar label="01 · Detecting" state="detecting"/>
        <Bar label="02 · No AI tool found" state="none"/>
        <Bar label="03 · MCP not configured" state="unconfigured" toolId="claudecode-cli"/>
        <Bar label="04 · Ready · Claude CLI" state="ready" toolId="claudecode-cli"/>
        <Bar label="05 · Ready · multi-tool" state="ready" toolId="claudecode-cli" multi/>
        <Bar label="06 · Sending" state="sending" toolId="claudecode-cli" value="why did step 3 fail?"/>
        <Bar label="07 · Error · retry" state="error" toolId="claudecode-cli"/>
        <Bar label="08 · Ready · Cursor" state="ready" toolId="cursor"/>
        <Bar label="09 · Ready · Windsurf" state="ready" toolId="windsurf"/>
        <Bar label="10 · Ready · Claude Ext" state="ready" toolId="claudecode-ext"/>
      </div>

      <h2>Section 2 — In panel, contextual states</h2>
      <p className="sub">What the developer actually sees at the bottom of the pipeline panel.</p>
      <div className="grid">
        <Full label="A · Detecting on first open">
          <MiniPanel title="payments-api · deploy" status="running"><AIBar state="detecting"/></MiniPanel>
        </Full>
        <Full label="B · Ready — happy path">
          <MiniPanel title="payments-api · deploy" status="running"><AIBar state="ready" toolId="claudecode-cli"/></MiniPanel>
        </Full>
        <Full label="C · Unconfigured + nudge">
          <MiniPanel title="payments-api · deploy" status="failed"><AIBar state="unconfigured" toolId="claudecode-cli"/></MiniPanel>
        </Full>
        <Full label="D · MCP setup card expanded">
          <MiniPanel title="payments-api · deploy" status="failed">
            <AIBar state="unconfigured" toolId="claudecode-cli" overlay={<MCPConfigureCard toolId="claudecode-cli"/>}/>
          </MiniPanel>
        </Full>
        <Full label="E · Configuring…">
          <MiniPanel title="payments-api · deploy" status="failed">
            <AIBar state="unconfigured" toolId="claudecode-cli" overlay={<MCPConfigureCard toolId="claudecode-cli" busy/>}/>
          </MiniPanel>
        </Full>
        <Full label="F · Configured — restart prompt">
          <MiniPanel title="payments-api · deploy" status="failed">
            <AIBar state="ready" toolId="claudecode-cli" overlay={<MCPConfigureCard toolId="claudecode-cli" done/>}/>
          </MiniPanel>
        </Full>
        <Full label="G · Sending query (CLI)">
          <MiniPanel title="payments-api · deploy" status="failed">
            <AIBar state="sending" toolId="claudecode-cli" value="why did integration tests fail?"/>
          </MiniPanel>
        </Full>
        <Full label="H · CLI response · inline">
          <MiniPanel title="payments-api · deploy" status="failed" footerOnly>
            <AIBar state="ready" toolId="claudecode-cli" overlay={<ResponsePanel/>}/>
          </MiniPanel>
        </Full>
        <Full label="I · Launched in external tool">
          <MiniPanel title="payments-api · deploy" status="failed">
            <AIBar state="ready" toolId="claudecode-ext" overlay={<ResponsePanel variant="launched"/>}/>
          </MiniPanel>
        </Full>
        <Full label="J · Windsurf — clipboard fallback">
          <MiniPanel title="payments-api · deploy" status="failed">
            <AIBar state="ready" toolId="windsurf" overlay={<ResponsePanel variant="clipboard"/>}/>
          </MiniPanel>
        </Full>
      </div>

      <h2>Section 3 — Tool picker</h2>
      <p className="sub">Only renders when ≥2 tools are detected.</p>
      <div className="grid">
        <Full label="All four installed · CLI selected">
          <MiniPanel title="payments-api · deploy" status="running">
            <AIBar state="ready" toolId="claudecode-cli" multi overlay={
              <ToolPicker toolId="claudecode-cli" installed={[
                { id:'claudecode-cli', mcpReady:true },
                { id:'claudecode-ext', mcpReady:true },
                { id:'cursor', mcpReady:false },
                { id:'windsurf', mcpReady:false },
              ]}/>
            }/>
          </MiniPanel>
        </Full>
        <Full label="Mixed MCP readiness">
          <MiniPanel title="payments-api · deploy" status="failed">
            <AIBar state="ready" toolId="cursor" multi overlay={
              <ToolPicker toolId="cursor" installed={[
                { id:'claudecode-cli', mcpReady:false },
                { id:'cursor', mcpReady:true },
              ]}/>
            }/>
          </MiniPanel>
        </Full>
      </div>

      <h2>Section 4 — Lifecycle</h2>
      <p className="sub">From activate() to answer.</p>
      <div className="flow-wrap">
        <div className="flow">
          <div className="flow-row">
            <div className="flow-step"><div className="flow-step-n">01 · DETECT</div><div className="flow-step-t">Detecting AI tools…</div><div className="flow-step-d">Non-blocking. Spinner replaces the badge.</div></div>
            <div className="flow-step"><div className="flow-step-n">02 · NUDGE</div><div className="flow-step-t">MCP not configured</div><div className="flow-step-d">Amber dot + "Configure MCP ›".</div></div>
            <div className="flow-step"><div className="flow-step-n">03 · CONFIGURE</div><div className="flow-step-t">Writes ~/.claude.json</div><div className="flow-step-d">Uses stored PAT. Reversible.</div></div>
            <div className="flow-step"><div className="flow-step-n">04 · READY</div><div className="flow-step-t">MCP ready · tool</div><div className="flow-step-d">Green dot. Input enabled.</div></div>
            <div className="flow-step"><div className="flow-step-n">05 · ANSWER</div><div className="flow-step-t">Inline or launched</div><div className="flow-step-d">CLI → in place. URI → 3s confirm.</div></div>
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
