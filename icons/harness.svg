<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Harness logo - diamond knot with four rounded petals -->
  <g fill="currentColor" transform="translate(50,50) rotate(45) translate(-50,-50)">
    <rect x="20" y="20" width="25" height="25" rx="8" opacity="0.95"/>
    <rect x="55" y="20" width="25" height="25" rx="8" opacity="0.95"/>
    <rect x="20" y="55" width="25" height="25" rx="8" opacity="0.95"/>
    <rect x="55" y="55" width="25" height="25" rx="8" opacity="0.95"/>
    <rect x="35" y="35" width="30" height="30" fill="none"/>
  </g>
</svg>
